name: Verify build

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Build application
        id: build
        continue-on-error: true
        run: npm run build > redesign-build.log 2>&1
      - name: Upload build diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: redesign-build-log
          path: redesign-build.log
      - name: Fail when build failed
        if: steps.build.outcome == 'failure'
        run: |
          tail -n 80 redesign-build.log
          exit 1
