name: Deploy UX redesign preview

on:
  push:
    branches: [ux-redesign-v2]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write
  actions: read

concurrency:
  group: pages-ux-redesign
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout redesign branch
        uses: actions/checkout@v4
        with:
          ref: ux-redesign-v2

      - name: Restore Vite source HTML
        run: cp app.template.html index.html

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload built site
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - name: Mirror production build to branch root
        run: |
          rm -rf assets
          cp dist/index.html index.html
          cp -R dist/assets assets
          if [ -f dist/favicon.svg ]; then cp dist/favicon.svg favicon.svg; fi
          touch .nojekyll
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html assets favicon.svg .nojekyll
          if ! git diff --cached --quiet; then
            git commit -m "Publish UX redesign preview"
            git push origin HEAD:ux-redesign-v2
          fi

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
