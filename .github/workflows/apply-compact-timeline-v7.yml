name: Apply compact timeline v7

on:
  push:
    branches: [ux-redesign-v2]
    paths:
      - .github/compact-v7.trigger

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ux-redesign-v2

      - name: Patch React timeline source
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          path = Path('src/AppRedesign.jsx')
          text = path.read_text(encoding='utf-8')

          wiki_function = '''function useWikiImage(title, active = true) {
            const [source, setSource] = useState(null);
            useEffect(() => {
              if (!title || !active) return;
              let cancelled = false;
              const key = `casovrstvy-image:${title}`;
              const cached = sessionStorage.getItem(key);
              if (cached) {
                if (cached !== "__missing__") setSource(cached);
                return;
              }

              const summaryImage = async (language, pageTitle) => {
                const response = await fetch(`https://${language}.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(String(pageTitle).replace(/ /g, "_"))}`);
                if (!response.ok) return null;
                const data = await response.json();
                return data.thumbnail?.source || data.originalimage?.source || null;
              };

              const searchImage = async (language) => {
                const url = new URL(`https://${language}.wikipedia.org/w/api.php`);
                Object.entries({
                  action: "query",
                  generator: "search",
                  gsrsearch: title,
                  gsrlimit: "1",
                  prop: "pageimages",
                  piprop: "thumbnail|original",
                  pithumbsize: "420",
                  format: "json",
                  formatversion: "2",
                  origin: "*",
                }).forEach(([name, value]) => url.searchParams.set(name, value));
                const data = await (await fetch(url)).json();
                const page = data.query?.pages?.[0];
                return page?.thumbnail?.source || page?.original?.source || null;
              };

              (async () => {
                for (const language of ["cs", "en"]) {
                  try {
                    const exact = await summaryImage(language, title);
                    const image = exact || await searchImage(language);
                    if (image) {
                      sessionStorage.setItem(key, image);
                      if (!cancelled) setSource(image);
                      return;
                    }
                  } catch {
                    // Continue with the next Wikipedia language.
                  }
                }
                sessionStorage.setItem(key, "__missing__");
              })();

              return () => { cancelled = true; };
            }, [title, active]);
            return source;
          }'''

          text, count = re.subn(
              r'function useWikiImage\(title, active = true\) \{.*?\n\}',
              wiki_function,
              text,
              count=1,
              flags=re.S,
          )
          if count != 1:
              raise SystemExit('Could not replace useWikiImage')

          media_component = '''

          function WikiMedia({ title, Icon = History, className = "" }) {
            const ref = useRef(null);
            const [active, setActive] = useState(false);
            const source = useWikiImage(title, active);
            useEffect(() => {
              if (!ref.current) return;
              const observer = new IntersectionObserver(([entry]) => {
                if (entry.isIntersecting) {
                  setActive(true);
                  observer.disconnect();
                }
              }, { rootMargin: "280px" });
              observer.observe(ref.current);
              return () => observer.disconnect();
            }, []);
            return (
              <span ref={ref} className={`timeline-media ${className}`}>
                {source ? <img src={source} alt="" loading="lazy" referrerPolicy="no-referrer" /> : <Icon size={18} />}
              </span>
            );
          }'''

          marker = '\n\nfunction HeroPreview() {'
          if marker not in text:
              raise SystemExit('Could not find HeroPreview marker')
          text = text.replace(marker, media_component + marker, 1)

          new_card = '''function TimelineItemCard({ item, viewStart, viewEnd, focusedAuthorId, onFocus, onOpen }) {
            const span = viewEnd - viewStart;
            const visibleStart = Math.max(item.start, viewStart);
            const visibleEnd = Math.min(item.end, viewEnd);
            const left = Math.max(0, Math.min(99, ((visibleStart - viewStart) / span) * 100));
            const visibleDuration = Math.max(0, visibleEnd - visibleStart);
            const widthPercent = Math.max(0, (visibleDuration / span) * 100);
            const isAuthor = item.kind === "author";
            const isWork = item.kind === "work";
            const slots = isAuthor ? 2 : isWork ? 3 : 2;
            const slotGap = isAuthor ? 52 : isWork ? 32 : 44;
            const top = 32 + (hash(item.id) % slots) * slotGap;
            const Icon = laneIcon(item);
            const focused = item.id === focusedAuthorId || item.authorId === focusedAuthorId;
            const minimumWidth = isAuthor ? 108 : isWork ? 82 : 96;
            return (
              <button
                className={`timeline-item lane-${item.lane} ${isAuthor ? "author-item" : ""} ${isWork ? "work-item" : ""} ${focused ? "focused" : ""}`}
                style={{
                  left: `${left}%`,
                  top,
                  width: visibleDuration > 1 ? `max(${minimumWidth}px, ${widthPercent}%)` : minimumWidth,
                  "--lane-soft": LANE_TONES[item.lane].soft,
                  "--lane-strong": LANE_TONES[item.lane].strong,
                }}
                onClick={onOpen}
                onMouseEnter={() => onFocus(isAuthor ? item.id : item.authorId || null)}
                onMouseLeave={() => onFocus(null)}
                title={`${item.title} · ${formatRange(item)}`}
              >
                {isAuthor
                  ? <WikiPortrait title={item.wikiTitle || item.title} className="timeline-cutout" />
                  : <WikiMedia title={item.wikiTitle || item.title} Icon={Icon} />}
                <span className="item-copy"><strong>{item.title}</strong><small>{formatRange(item)}</small></span>
              </button>
            );
          }'''

          text, count = re.subn(
              r'function TimelineItemCard\(\{ item, viewStart, viewEnd, focusedAuthorId, onFocus, onOpen \}\) \{.*?\n\}\n\nfunction TimelineApp',
              new_card + '\n\nfunction TimelineApp',
              text,
              count=1,
              flags=re.S,
          )
          if count != 1:
              raise SystemExit('Could not replace TimelineItemCard')

          text = text.replace(
              'const [enabledLanes, setEnabledLanes] = useState(new Set(LANE_ORDER));',
              'const [enabledLanes, setEnabledLanes] = useState(new Set(["authors", "rulers", "czech", "world"]));',
              1,
          )

          text = text.replace(
              '<i>{active ? "ON" : "OFF"}</i>',
              '<i>{active ? "Zapnuto" : "Vypnuto"}</i>',
              1,
          )

          text = text.replace(
              'className="timeline-lane" style={{ "--lane-soft": LANE_TONES[lane].soft, "--lane-strong": LANE_TONES[lane].strong }}',
              'className="timeline-lane" data-lane={lane} style={{ "--lane-soft": LANE_TONES[lane].soft, "--lane-strong": LANE_TONES[lane].strong }}',
              1,
          )

          old_period = '''{visiblePeriods.map((period) => <button key={period.id} style={{ left: `${(period.start - viewStart) / span * 100}%`, width: `max(72px, ${(period.end - period.start) / span * 100}%)`, background: `${period.color}22`, borderColor: `${period.color}66`, color: period.color }} onClick={() => setRange(period.start, period.end)}><strong>{period.title}</strong><small>{formatYear(period.start)}–{formatYear(period.end)}</small></button>)}'''
          new_period = '''{visiblePeriods.map((period) => <button key={period.id} style={{ left: `${(period.start - viewStart) / span * 100}%`, top: `${8 + (hash(period.id) % 3) * 30}px`, width: `max(72px, ${(period.end - period.start) / span * 100}%)`, background: `${period.color}22`, borderColor: `${period.color}66`, color: period.color }} onClick={() => setRange(period.start, period.end)} title={`${period.title} · ${formatYear(period.start)}–${formatYear(period.end)}`}><strong>{period.title}</strong><small>{formatYear(period.start)}–{formatYear(period.end)}</small></button>)}'''
          if old_period not in text:
              raise SystemExit('Could not find period rendering')
          text = text.replace(old_period, new_period, 1)

          path.write_text(text, encoding='utf-8')
          PY

      - name: Verify build
        run: |
          cp app.template.html index.html
          npm ci
          npm run build

      - name: Commit compact timeline
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/AppRedesign.jsx
          git commit -m "Compact timeline rows and enable Wikipedia media"
          git push origin HEAD:ux-redesign-v2
